<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Legacy Stewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a96e',
                        'gold-light': '#e8d5b5',
                        'gold-dark': '#a8864f',
                        rose: '#b76e79',
                        cream: '#F0EBE3',
                        sand: '#E6DED3',
                        charcoal: '#2C2C35',
                        muted: '#6B6B7B',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>

    <!-- ==================== NAVIGATION ==================== -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-[#FDFAF6] border-b border-gold/10">
        <div class="max-w-6xl mx-auto px-6 py-3.5 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full border-2 border-gold flex items-center justify-center bg-[#F7F3ED]/80">
                    <span class="font-serif text-gold font-bold text-xs">LS</span>
                </div>
                <span class="font-serif text-charcoal tracking-wide hidden sm:block">Legacy Stewards</span>
            </a>
            <div class="flex items-center gap-4">
                <span id="user-name" class="text-sm text-charcoal font-medium hidden sm:block"></span>
                <button onclick="Auth.logout()" class="text-sm text-muted hover:text-gold transition-colors cursor-pointer">Sign Out</button>
            </div>
        </div>
    </nav>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main id="dashboard-content" class="pt-[60px] h-screen flex flex-col overflow-hidden">

        <!-- ===== TOP BAR: Profile + Glance Stats ===== -->
        <div class="px-4 md:px-6 py-3 border-b border-gold/10 bg-[#FDFAF6] flex-shrink-0">
            <div class="max-w-[1400px] mx-auto">
                <!-- Profile row -->
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-3">
                        <div id="client-avatar" class="w-10 h-10 rounded-full bg-gold/20 border-2 border-gold flex items-center justify-center text-gold font-serif text-sm font-bold overflow-hidden flex-shrink-0"></div>
                        <div>
                            <h1 class="font-serif text-lg text-charcoal leading-tight" id="client-name">Loading...</h1>
                            <p class="text-[11px] text-charcoal/50" id="client-since"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right hidden sm:block">
                            <p class="text-[11px] text-charcoal/50 uppercase tracking-wide font-medium">Your Steward</p>
                            <p class="font-semibold text-charcoal text-sm leading-tight" id="steward-name">Loading...</p>
                        </div>
                        <div id="steward-avatar" class="w-10 h-10 rounded-full bg-charcoal/10 border-2 border-charcoal/20 flex items-center justify-center text-charcoal font-serif text-sm font-bold overflow-hidden flex-shrink-0"></div>
                    </div>
                </div>
                <!-- Glance stats row -->
                <div class="grid grid-cols-4 gap-2" id="glance-bar">
                    <div class="bg-white/60 border border-gold/10 rounded-lg px-3 py-2">
                        <p class="text-[10px] text-charcoal/40 uppercase tracking-wide font-medium">Phase</p>
                        <p class="font-serif text-lg text-gold leading-tight" id="glance-phase">&mdash;</p>
                        <p class="text-[10px] text-charcoal/50" id="glance-phase-name"></p>
                    </div>
                    <div class="bg-white/60 border border-gold/10 rounded-lg px-3 py-2">
                        <p class="text-[10px] text-charcoal/40 uppercase tracking-wide font-medium">Milestones</p>
                        <p class="font-serif text-lg text-gold leading-tight" id="glance-milestones">&mdash;</p>
                        <p class="text-[10px] text-charcoal/50" id="glance-milestones-label">completed</p>
                    </div>
                    <div class="bg-white/60 border border-gold/10 rounded-lg px-3 py-2">
                        <p class="text-[10px] text-charcoal/40 uppercase tracking-wide font-medium">Days</p>
                        <p class="font-serif text-lg text-gold leading-tight" id="glance-days">&mdash;</p>
                        <p class="text-[10px] text-charcoal/50">as client</p>
                    </div>
                    <div class="bg-white/60 border border-gold/10 rounded-lg px-3 py-2">
                        <p class="text-[10px] text-charcoal/40 uppercase tracking-wide font-medium">Messages</p>
                        <p class="font-serif text-lg text-gold leading-tight" id="glance-messages">&mdash;</p>
                        <p class="text-[10px] text-charcoal/50" id="glance-messages-label">unread</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 3-COLUMN LAYOUT ===== -->
        <div class="flex-1 overflow-hidden px-4 md:px-6 py-4">
            <div class="max-w-[1400px] mx-auto h-full grid grid-cols-1 md:grid-cols-[200px_1fr_320px] gap-4">

                <!-- ===== LEFT COLUMN: Journey + Status ===== -->
                <div class="hidden md:flex flex-col gap-4 overflow-y-auto dashboard-column pr-2">
                    <!-- Journey Phases -->
                    <div>
                        <h2 class="font-serif text-sm text-charcoal mb-3 uppercase tracking-wider">Journey</h2>
                        <div id="journey-steps" class="space-y-1"></div>
                    </div>

                    <!-- Status Block -->
                    <div class="mt-auto">
                        <div id="status-block" class="p-3 rounded-lg border border-gold/20 bg-white/60">
                            <div class="flex items-center gap-2 mb-1">
                                <span id="status-badge" class="px-2 py-0.5 rounded-full text-[10px] font-semibold">Loading</span>
                            </div>
                            <p class="text-xs text-charcoal font-medium leading-snug" id="status-meaning">Loading...</p>
                            <p class="text-[10px] text-charcoal/50 mt-1 leading-snug" id="status-next-action"></p>
                            <p class="text-[10px] text-charcoal/30 mt-1" id="status-updated"></p>
                        </div>
                    </div>
                </div>

                <!-- ===== CENTER COLUMN: Milestones ===== -->
                <div class="overflow-y-auto dashboard-column pr-2">
                    <!-- Mobile: Journey + Status (hidden on desktop) -->
                    <div class="md:hidden mb-4">
                        <div class="flex gap-2 overflow-x-auto pb-2" id="journey-steps-mobile"></div>
                        <div id="status-block-mobile" class="p-3 rounded-lg border border-gold/20 bg-white/60 mt-3">
                            <div class="flex items-center gap-2 mb-1">
                                <span id="status-badge-mobile" class="px-2 py-0.5 rounded-full text-[10px] font-semibold">Loading</span>
                            </div>
                            <p class="text-xs text-charcoal font-medium" id="status-meaning-mobile">Loading...</p>
                            <p class="text-[10px] text-charcoal/50 mt-1" id="status-next-action-mobile"></p>
                        </div>
                    </div>

                    <h2 class="font-serif text-base text-charcoal mb-3">Milestones</h2>
                    <div id="timeline-container" class="timeline">
                        <div class="timeline-item">
                            <div class="timeline-dot timeline-dot-upcoming"></div>
                            <div class="skeleton h-16 w-full"></div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-dot timeline-dot-upcoming"></div>
                            <div class="skeleton h-16 w-full"></div>
                        </div>
                    </div>
                </div>

                <!-- ===== RIGHT COLUMN: Tabbed Panel ===== -->
                <div class="flex flex-col overflow-hidden bg-white/40 border border-gold/15 rounded-xl">
                    <!-- Tab bar -->
                    <div class="flex border-b border-gold/10 flex-shrink-0">
                        <button class="dashboard-tab active" data-tab="messages" onclick="ClientDashboard.switchTab('messages')">
                            Messages <span id="tab-msg-badge" class="hidden ml-1 w-4 h-4 text-[9px] bg-gold text-white rounded-full inline-flex items-center justify-center"></span>
                        </button>
                        <button class="dashboard-tab" data-tab="notes" onclick="ClientDashboard.switchTab('notes')">Notes</button>
                        <button class="dashboard-tab" data-tab="documents" onclick="ClientDashboard.switchTab('documents')">Docs</button>
                    </div>

                    <!-- Tab: Messages -->
                    <div id="tab-panel-messages" class="tab-panel flex flex-col flex-1 overflow-hidden">
                        <div id="message-thread" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 scroll-smooth">
                            <p id="no-messages" class="text-xs text-charcoal/40 text-center mt-6">No messages yet. Send your steward a message below.</p>
                        </div>
                        <div class="p-3 border-t border-gold/10 flex-shrink-0">
                            <div class="flex gap-2">
                                <textarea id="message-input" rows="2"
                                    placeholder="Write a message..."
                                    class="flex-1 text-xs rounded-lg border border-charcoal/15 p-2 resize-none focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold/30 bg-white text-charcoal placeholder-charcoal/30"></textarea>
                                <button id="send-message-btn"
                                    class="px-3 py-2 bg-gold text-white text-xs font-semibold rounded-lg hover:bg-gold/90 transition-colors self-end cursor-pointer">
                                    Send
                                </button>
                            </div>
                            <p class="text-[10px] text-charcoal/30 mt-1">Ctrl+Enter to send</p>
                        </div>
                    </div>

                    <!-- Tab: Notes -->
                    <div id="tab-panel-notes" class="tab-panel hidden flex-1 overflow-y-auto p-3">
                        <div id="notes-container">
                            <div class="skeleton h-12 w-full mb-2"></div>
                            <div class="skeleton h-12 w-full"></div>
                        </div>
                    </div>

                    <!-- Tab: Documents -->
                    <div id="tab-panel-documents" class="tab-panel hidden flex-1 overflow-y-auto p-3">
                        <div id="documents-container">
                            <div class="skeleton h-10 w-full"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
